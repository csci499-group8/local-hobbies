spring:
  application:
    name: Local Hobbies Backend
  datasource:
    url: ${DEV_SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/local_hobbies}
    username: ${DEV_SPRING_DATASOURCE_USERNAME:postgres}
    password: ${DEV_SPRING_DATASOURCE_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate #let Flyway change tables
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public
  jackson:
    mapper:
      accept-case-insensitive-enums: true #for java.time.DayOfWeek

application:
  security:
    jwt:
      secret-key: ${DEV_JWT_SECRET_KEY}
      access-duration: ${JWT_ACCESS_DURATION:30m}
      refresh-duration: ${JWT_REFRESH_DURATION:14d}
  supabase-s3:
    endpoint: ${SUPABASE_S3_ENDPOINT}
    region: ${SUPABASE_S3_REGION:us-west-2}
    access-key: ${DEV_SUPABASE_S3_ACCESS_KEY}
    secret-key: ${DEV_SUPABASE_S3_SECRET_KEY}
    bucket: ${DEV_SUPABASE_S3_BUCKET}
    put-duration: ${SUPABASE_S3_PUT_DURATION:10m}
    get-duration: ${SUPABASE_S3_GET_DURATION:1h}
  user:
    onboarding:
      min-num-hobbies: ${ONBOARDING_MIN_NUM_HOBBIES:3}
      min-num-availabilities: ${ONBOARDING_MIN_NUM_AVAILABILITIES:1}
    profile-photo-placeholder-url: ${USER_PROFILE_PHOTO_PLACEHOLDER_URL:https://placehold.net/avatar.png}
  hobby:
    hobby-photo-placeholder-url: ${HOBBY_HOBBY_PHOTO_PLACEHOLDER_URL:https://placehold.net/8.png}
  availability:
    #time window within which an availability can be scheduled; also time window
    #within which recurring availabilities are projected to intervals
    scheduling-window-days: ${AVAILABILITY_SCHEDULING_WINDOW_DAYS:180}
    #time window within which users' schedules are compared
    overlap-window-days: ${AVAILABILITY_OVERLAP_WINDOW_DAYS:30}
    #maximum duration of an availability;
    #cannot exceed 168 (1 week; enforced by database)
    max-duration-hours: ${AVAILABILITY_MAX_DURATION_HOURS:168}

logging:
  level:
    root: info
    org.flywaydb: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    org.springframework.security: debug
    io.github.csci499_group8: debug
