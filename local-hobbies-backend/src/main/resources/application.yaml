spring:
  application:
    name: Local Hobbies Backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/local_hobbies}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate #let Flyway change tables
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public
  jackson:
    mapper:
      accept-case-insensitive-enums: true #for java.time.DayOfWeek

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    root: info
    org.flywaydb: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    org.springframework.security: debug
    io.github.csci499_group8: debug
