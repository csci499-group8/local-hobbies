spring:
  datasource:
    url: ${PROD_SPRING_DATASOURCE_URL}
    username: ${PROD_SPRING_DATASOURCE_USERNAME}
    password: ${PROD_SPRING_DATASOURCE_PASSWORD}
  jpa:
    show-sql: false

application:
  security:
    jwt:
      secret-key: ${PROD_JWT_SECRET_KEY}
  supabase-s3:
    access-key: ${PROD_SUPABASE_S3_ACCESS_KEY}
    secret-key: ${PROD_SUPABASE_S3_SECRET_KEY}
    bucket: ${PROD_SUPABASE_S3_BUCKET}

logging:
  level:
    root: warn
    org.flywaydb: info
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn
    org.springframework.security: info
    io.github.csci499_group8: info
