          type: string
          example: https://example.com/photos/123/hobby135.jpg
        caption:
          type: string
          example: Had a great time!

    HobbyPhotoUpdateRequest:
      type: object
      description: only contains changed fields
      properties:
        hobby:
          type: string
          description: should only be changed if current value is incorrect
          example: Hiking
        caption:
          type: string
          nullable: true
          example: Had a great time!

    HobbyPhotoResponse:
      type: object
      required:
        - id
        - hobby
        - photoUrl
        - caption
      properties:
