        name:
          type: string
          example: Hiking
        category:
          type: string
          example: Fitness

    HobbyOverlapResponse:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Hiking

    # ==================== Availability Schemas ====================
    OneTimeAvailabilityCreationRequest:
      type: object
      required:
        - location
        - startDate
        - startTime
        - duration
      properties:
        location:
          $ref: '#/components/schemas/GeoJsonPoint'
        startDate:
          type: string
          format: date
          example: "2026-03-15"
        startTime:
          type: string
          format: time
          example: "14:00"
        duration:
          type: string
          description: ISO 8601 duration
          example: PT3H

    OneTimeAvailabilityUpdateRequest:
      type: object
      properties:
        location:
          $ref: '#/components/schemas/GeoJsonPoint'
        startDate:
          type: string
          format: date
          example: "2026-03-15"
        startTime:
          type: string
          format: time
          example: "14:00"
        duration:
          type: string
          description: ISO 8601 duration
          example: PT3H

    OneTimeAvailabilityResponse:
      type: object
      required:
        - id
        - userId
        - location
        - startDate
        - startTime
        - duration
      properties:
        id:
          type: integer
          example: 41
        userId:
          type: integer
          example: 123
        location:
          $ref: '#/components/schemas/GeoJsonPoint'
        startDate:
          type: string
          format: date
          example: "2026-03-15"
        startTime:
          type: string
          format: time
          example: "14:00"
        duration:
          type: string
          description: ISO 8601 duration
          example: PT3H

    RecurringAvailabilityCreationRequest:
      type: object
      required:
        - location
        - ruleStart
        - frequency
        - startTime
        - duration
      properties:
        location:
          $ref: '#/components/schemas/GeoJsonPoint'
        ruleStart:
          type: string
          format: date
          example: "2026-01-01"
        ruleEnd:
          type: string
          format: date
          description: omitted if rule continues indefinitely
          example: "2026-12-31"
        frequency:
          type: string
          enum: [Weekly, Every two weeks, Monthly]
          example: Weekly
        startDayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
          description: 0=Sunday, 6=Saturday (for weekly/every two weeks); omitted if startDayOfMonth is submitted
        startDayOfMonth:
          type: integer
          minimum: 1
          maximum: 31
          description: day of month (for monthly); omitted if startDayOfWeek is submitted
        startTime:
          type: string
          format: time
          example: "14:00"
        duration:
          type: string
          description: ISO 8601 duration
          example: PT2H

    RecurringAvailabilityUpdateRequest:
      type: object
      properties:
        location:
          $ref: '#/components/schemas/GeoJsonPoint'
        ruleStart:
          type: string
          format: date
          example: "2026-01-01"
        ruleEnd:
          type: string
          format: date
          nullable: true
          description: null if rule continues indefinitely
          example: "2026-12-31"
        frequency:
          type: string
          enum: [Weekly, Every two weeks, Monthly]
          example: Weekly
        startDayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
          nullable: true
          description: 0=Sunday, 6=Saturday (for weekly/every two weeks); null if startDayOfMonth is not null
        startDayOfMonth:
          type: integer
          minimum: 1
          maximum: 31
          nullable: true
          description: day of month (for monthly); null if startDayOfWeek is not null
        startTime:
          type: string
          format: time
          example: "14:00"
        duration:
          type: string
          description: ISO 8601 duration
          example: PT2H

    RecurringAvailabilityResponse:
      type: object
      required:
        - id
        - userId
        - location
        - ruleStart
        - ruleEnd
        - frequency
        - startDayOfWeek
        - startDayOfMonth
        - startTime
        - duration
      properties:
        id:
          type: integer
          example: 41
        userId:
          type: integer
          example: 123
        location:
          $ref: '#/components/schemas/GeoJsonPoint'
        ruleStart:
          type: string
          format: date
          example: "2026-01-01"
        ruleEnd:
          type: string
          format: date
          nullable: true
          description: null if rule continues indefinitely
          example: "2026-12-31"
        frequency:
          type: string
          enum: [Weekly, Every two weeks, Monthly]
          example: Weekly
        startDayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
          nullable: true
          description: 0=Sunday, 6=Saturday (for weekly/every two weeks); null if startDayOfMonth is not null
        startDayOfMonth:
          type: integer
          minimum: 1
          maximum: 31
          nullable: true
          description: day of month (for monthly); null if startDayOfWeek is not null
        startTime:
          type: string
          format: time
          example: "14:00"
        duration:
          type: string
          description: ISO 8601 duration
          example: PT2H

    AvailabilityExceptionCreationRequest:
      type: object
      required:
        - recurringAvailabilityId
        - exceptionDate
        - exceptionReason
        - isCancelled
      properties:
        recurringAvailabilityId:
          type: integer
        exceptionDate:
          type: string
          format: date
          example: "2026-03-04"
        exceptionReason:
          type: string
          example: Traveling
        isCancelled:
          type: boolean
        overrideLocation:
          description: omitted if isCancelled = true
          allOf:
            - $ref: '#/components/schemas/GeoJsonPoint'
        overrideStartTime:
          type: string
          format: time
          description: omitted if isCancelled = true
        overrideDuration:
          type: string
          description: ISO 8601 duration; omitted if isCancelled = true

    AvailabilityExceptionUpdateRequest:
      type: object
      properties:
        recurringAvailabilityId:
          type: integer
        exceptionDate:
          type: string
          format: date
          example: "2026-03-04"
        exceptionReason:
          type: string
          example: Traveling
        isCancelled:
          type: boolean
        overrideLocation:
          description: null if isCancelled = true
          allOf:
          - $ref: '#/components/schemas/GeoJsonPoint'
        overrideStartTime:
          type: string
          format: time
          description: null if isCancelled = true
        overrideDuration:
          type: string
          description: ISO 8601 duration; null if isCancelled = true

    AvailabilityExceptionResponse:
      type: object
      required:
        - id
        - userId
        - recurringAvailabilityId
        - exceptionDate
        - exceptionReason
        - isCancelled
        - overrideLocation
        - overrideStartTime
        - overrideDuration
      properties:
        id:
          type: integer
          example: 529
        userId:
          type: integer
          example: 123
        recurringAvailabilityId:
          type: integer
          example: 76
        exceptionDate:
          type: string
          format: date
          example: "2026-02-04"
        exceptionReason:
          type: string
          example: Traveling
        isCancelled:
          type: boolean
        overrideLocation:
          nullable: true
          description: null if isCancelled = true
          allOf:
            - $ref: '#/components/schemas/GeoJsonPoint'
        overrideStartTime:
          type: string
          format: time
          nullable: true
          description: null if isCancelled = true
          example: "16:00"
        overrideDuration:
          type: string
          nullable: true
          description: ISO 8601 duration; null if isCancelled = true
          example: PT3H

    AvailabilityCreationListRequest:
      type: object
      description: used during onboarding
      required:
        - oneTime
        - recurring
        - exceptions
      properties:
        oneTime:
          type: array
          items:
            $ref: '#/components/schemas/OneTimeAvailabilityCreationRequest'
        recurring:
          type: array
          items:
            $ref: '#/components/schemas/RecurringAvailabilityCreationRequest'
        exceptions:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilityExceptionCreationRequest'

    AvailabilityListResponse:
      type: object
      required:
        - oneTime
        - recurring
        - exceptions
      properties:
        oneTime:
          type: array
          items:
            $ref: '#/components/schemas/OneTimeAvailabilityResponse'
        recurring:
          type: array
          items:
            $ref: '#/components/schemas/RecurringAvailabilityResponse'
        exceptions:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilityExceptionResponse'

    AvailabilityOverlapResponse:
      type: object
      required:
        - participants
        - location
        - startDate
        - startTime
        - duration
      properties:
        participants:
          type: array
          items:
            type: object
            required:
              - userId
              - availabilityId
            properties:
              userId:
                type: integer
                example: 123
              availabilityId:
                type: integer
                example: 529
        location:
          $ref: '#/components/schemas/GeoJsonPoint'
        startDate:
          type: string
          format: date
          example: "2026-03-15"
        startTime:
          type: string
          format: time
          example: "14:00"
        duration:
          type: string
          description: ISO 8601 duration
          example: PT3H

    # ==================== Match Schemas ====================
    MatchedUser:
      type: object
      required:
        - id
        - name
        - profilePhotoUrl
        - lastSessionTime
      properties:
        id:
          type: integer
          example: 123
        name:
          type: string
          example: Alice Smith
        profilePhotoUrl:
          type: string
          nullable: true
          example: https://example.com/photos/123/profile.jpg
        lastSessionTime:
          type: string
          format: date-time
          description: ISO 8601 UTC timestamp
          example: "2026-02-08T12:00:00Z"

    MatchSearchRequest:
      type: object
      required:
        - hobby
        - radiusKilometers
        - minimumOverlapMinutes
        - filters
        - hardFilters
        - softFilters
      properties:
        hobby:
          type: string
          description: one of current user's hobbies
          example: Hiking
        radiusKilometers:
          type: integer
          minimum: 0
        minimumOverlapMinutes:
          type: integer
          minimum: 0
        filters:
          type: object
          properties:
            genders:
              type: array
              items:
                type: string
                enum: [Man, Woman, Nonbinary]
            minAge:
              type: integer
              minimum: 13
            maxAge:
              type: integer
              maximum: 120
            groupSize:
              type: integer
              minimum: 2
              maximum: 5
            experienceLevel:
              type: string
              enum: [Beginner, Intermediate, Advanced]
            availabilityType:
              type: string
              enum: [One-time, Recurring]
        hardFilters:
          type: array
          items:
            type: string
          description: filters that the user asserts must be satisfied; must be a subset of the filters that were passed; cannot overlap with soft filters
          example: ["genders", "minAge"]
        softFilters:
          type: array
          items:
            type: string
          description: filters used for prioritizing results; must be a subset of the filters that were passed; cannot overlap with soft filters
          example: ["experienceLevel"]

    MatchSearchResultResponse:
      type: object
      required:
        - matchedUser
        - hobby
        - distanceKilometers
        - overlappingAvailabilities
      properties:
        matchedUser:
          $ref: '#/components/schemas/MatchedUser'
        hobby:
          type: string
          example: Hiking
        distanceKilometers:
          type: number
          format: double
          example: 4.3
        overlappingAvailabilities:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilityOverlapResponse'

    SavedMatchCreationRequest:
      type: object
      required:
        - savedUserId
        - hobby
      properties:
        savedUserId:
          type: integer
          example: 123
        hobby:
          type: string
          example: Hiking
        notes:
          type: string
          example: Brings her dog on hikes

    SavedMatchUpdateRequest:
      type: object
      required:
        - notes
      properties:
        notes:
          type: string
          example: Brings her dog Max on hikes

    SavedMatchRestorationRequest:
      type: object
      required:
        - savedUserId
        - hobby
      properties:
        savedUserId:
          type: integer
          example: 123
        hobby:
          type: string
          example: Hiking

    SavedMatchResponse:
      type: object
      required:
        - id
        - userId
        - savedUser
        - hobby
        - notes
        - creationTime
      properties:
        id:
          type: integer
          example: 5
        userId:
          type: integer
          example: 80
        savedUser:
          $ref: '#/components/schemas/MatchedUser'
        hobby:
          type: string
          example: Hiking
        notes:
          type: string
          nullable: true
          example: Brings her dog on hikes
        creationTime:
          type: string
          format: date-time
          description: ISO 8601 UTC timestamp
          example: "2026-01-20T15:00:00Z"

    # ==================== Location Schemas ====================
    GeoJsonPoint:
      type: object
      required:
        - geometryType
        - coordinates
      properties:
        geometryType:
          type: string
          enum: [Point]
          description: GeoJSON point geometry type
        coordinates:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: number
          example: [-73.935242, 40.730610]
          description: "[longitude, latitude] format"

    # ==================== Cloud Upload Schemas ====================
    UploadUrlRequest:
      type: object
      description: request for presigned URL to upload file to cloud storage
      required:
        - fileName
        - contentType
      properties:
        fileName:
          type: string
          example: "vacation_hiking.jpg"
        contentType:
          type: string
          example: "image/jpeg"

    UploadUrlResponse:
      type: object
      required:
        - fileId
        - uploadUrl
        - expirationTime
      properties:
        fileId:
          type: string
          format: uuid
        uploadUrl:
          type: string
          format: uri
          description: cloud storage URL for image binary save request
        expirationTime:
          type: string
          format: date-time
          description: ISO 8601 UTC timestamp
          example: "2026-02-08T12:00:00Z"

    # ==================== Error Schemas ====================
    GlobalError:
      type: object
      required:
        - errorCode
        - errorMessage
        - timestamp
        - endpointURI
      properties:
        errorCode:
          type: string
          example: RESOURCE_NOT_FOUND
        errorMessage:
          type: string
          example: The requested hobby was not found.
        timestamp:
          type: string
          format: date-time
        endpointURI:
          type: string
          example: "/api/hobbies/Hiking"

  responses:
    # ==================== Error Responses ====================
    BadRequestError: #400
      description: "The request was invalid or cannot be served."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GlobalError'

    UnauthorizedError: #401
      description: "Authentication is required or has failed."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GlobalError'

    ForbiddenError: #403
      description: "Insufficient permissions to access this resource."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GlobalError'

    NotFoundError: #404
      description: "The requested resource could not be found."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GlobalError'

    ConflictError: #409
      description: "The request could not be completed due to a conflict with the current state of the resource."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GlobalError'

    InternalServerError: #500
      description: "An unexpected error occurred on the server."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GlobalError'