          example: Woman
        bio:
          type: string
          nullable: true
          example: Love hiking and coffee!
        locationApproximate:
          type: string
          example: San Francisco, CA
        publicContactInfo:
          type: string
          example: "@asmith123 on Instagram"
        profilePhotoUrl:
          type: string
          nullable: true
          example: https://example.com/photos/123.jpg
        hobbies:
          type: array
          items:
            $ref: '#/components/schemas/HobbyResponse'
        hobbyPhotos:
          type: array
          items:
            $ref: '#/components/schemas/HobbyPhotoResponse'

    OtherUserProfileResponse:
      type: object
      required:
        - id
        - name
        - age
        - genderDisplayed
        - bio
        - locationApproximate
        - publicContactInfo
        - profilePhotoUrl
        - lastSessionTime
        - hobbies
        - hobbyPhotos
        - isSavedMatch
        - overlappingHobbies
        - overlappingAvailabilities
      properties:
        id:
          type: integer
          example: 123
        name:
          type: string
          example: Alice Smith
        age:
          type: integer
          nullable: true
          description: null if showAge is false
          example: 29
        genderDisplayed:
          type: string
          nullable: true
          description: null if not set or if showGenderDisplayed is false
          example: Woman
        bio:
          type: string
          nullable: true
          example: Love hiking and coffee!
        locationApproximate:
          type: string
          example: San Francisco, CA
        publicContactInfo:
          type: string
          example: "@asmith123 on Instagram"
        profilePhotoUrl:
          type: string
          example: https://example.com/photos/123/profile.jpg
        lastSessionTime:
          type: string
          format: date-time
