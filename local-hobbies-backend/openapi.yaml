          items:
            $ref: '#/components/schemas/HobbyOverlapResponse'
        overlappingAvailabilities:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilityOverlapResponse'

    # ==================== Hobby Schemas ====================
    HobbyCreationRequest:
      type: object
      required:
        - name
        - experienceLevel
      properties:
        name:
          type: string
          example: Hiking
        experienceLevel:
          type: string
          enum: [Beginner, Intermediate, Advanced]
          example: Intermediate

    HobbyUpdateRequest:
      type: object
      required:
        - experienceLevel
      properties:
        experienceLevel:
          type: string
          enum: [Beginner, Intermediate, Advanced]
          example: Advanced

    HobbyResponse:
      type: object
      required:
        - id
        - name
        - category
        - experienceLevel
      properties:
        id:
          type: integer
          example: 49
        name:
          type: string
          example: Hiking
        category:
          type: string
          example: Fitness
        experienceLevel:
          type: string
          enum: [Beginner, Intermediate, Advanced]
