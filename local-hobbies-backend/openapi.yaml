          type: integer
          example: 335
        hobby:
          type: string
          example: Hiking
        photoUrl:
          type: string
          example: https://example.com/photos/123/hobby135.jpg
        caption:
          type: string
          nullable: true
          example: Had a great time!

    GlobalHobbyResponse:
      type: object
      required:
