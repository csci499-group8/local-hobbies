          properties:
            nextAvailability: #change to booked meetup once implemented
              $ref: '#/components/schemas/OneTimeAvailabilityResponse'
        matchSummary:
          type: object
          required:
            - count
          properties:
            count:
              type: integer
              example: 13

    CurrentUserProfileResponse:
      type: object
      required:
        - name
        - age
        - genderDisplayed
        - bio
        - locationApproximate
        - publicContactInfo
        - profilePhotoUrl
        - hobbies
        - hobbyPhotos
      properties:
